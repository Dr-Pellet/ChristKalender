# GitHub Actions Workflow für automatisches Deployment auf GitHub Pages
name: Deploy to GitHub Pages
on:
  # Wird bei jedem Push auf den main-Branch ausgeführt
  push:
    branches: ['main']
  # Ermöglicht manuelles Auslösen
  workflow_dispatch:
# Berechtigungen für GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Verhindert parallele Deployments
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4
      - name: 📦 Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: 📚 Abhängigkeiten installieren
        run: npm ci
      - name: 🔨 Projekt bauen
        run: npm run build
      - name: 📄 GitHub Pages konfigurieren
        uses: actions/configure-pages@v5
      - name: 📤 Build-Artefakte hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: 🚀 Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
